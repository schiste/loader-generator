name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: node --test

      - name: Check index.html inline script parses
        run: |
          node -e '
            const fs = require("fs"), vm = require("vm");
            const s = fs.readFileSync("index.html", "utf8");
            const js = s.slice(s.indexOf("// System States"), s.lastIndexOf("</script>"));
            new vm.Script(js);
            console.log("index.html inline script parses OK");
          '
